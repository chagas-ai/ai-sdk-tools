name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-main
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Create Release PR or Publish
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@^11.5.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Build Packages
        run: bun run build:chagas

      - name: Typecheck Packages
        run: bun run type-check:chagas

      - name: Validate Release PAT
        env:
          CHAGAS_RELEASE_PAT: ${{ secrets.CHAGAS_RELEASE_PAT }}
        run: |
          if [ -z "$CHAGAS_RELEASE_PAT" ]; then
            echo "::error::Missing CHAGAS_RELEASE_PAT secret. Add a fine-grained PAT with repository Contents (Read/Write) and Pull requests (Read/Write)."
            exit 1
          fi

      - name: Create Release Pull Request or Publish
        uses: changesets/action@v1
        with:
          publish: bun run release:publish
          version: bun run version-packages
          commit: "chore: release packages"
          title: "chore: release packages"
        env:
          GITHUB_TOKEN: ${{ secrets.CHAGAS_RELEASE_PAT }}
          NPM_CONFIG_PROVENANCE: true
